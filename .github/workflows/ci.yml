name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # shellcheck is preinstalled on the ubuntu-latest runner.
      - name: shellcheck
        run: shellcheck -x -S style install.sh lib/*.sh modules/*.sh tests/*.sh

      - name: set -e regression suite
        run: bash tests/test_sete.sh

      - name: PyPI-unreachable resilience suite
        run: bash tests/test_pypi.sh
