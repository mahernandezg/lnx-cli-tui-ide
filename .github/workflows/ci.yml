name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # shellcheck is preinstalled on the ubuntu-latest runner.
      - name: shellcheck
        run: shellcheck -x -S style install.sh lib/*.sh modules/*.sh tests/*.sh

      - name: set -e regression suite
        run: bash tests/test_sete.sh

      - name: PyPI-unreachable resilience suite
        run: bash tests/test_pypi.sh

      - name: tab-title managed-block suite
        run: bash tests/test_tab_title.sh

      # dconf-cli so the GNOME Terminal profile suite runs for real (it self-skips
      # if dconf is absent or its D-Bus service cannot activate). dbus-run-session
      # ships with the preinstalled dbus package on the runner.
      - name: install dconf for the GNOME Terminal profile suite
        run: sudo apt-get update && sudo apt-get install -y dconf-cli

      - name: GNOME Terminal profile suite
        run: bash tests/test_gnome_profile.sh

      - name: Claude Code statusline suite
        run: bash tests/test_statusline.sh
