# starship.toml — lnx-cli-tui-ide
# Two-line prompt: full path + git/versions on line 1, a ╰─❯ connector caret on
# line 2 (one continuous brand blue when all is well, inviting you to type).
#
# Tuned for speed on old machines and large git repos (e.g. a big TypeScript monorepo):
# conservative timeouts and ONLY the modules actually used (the explicit `format`
# below means no other module renders, so the prompt stays fast and quiet).
# Most icons come from JetBrainsMono Nerd Font; a few standard-Unicode glyphs
# (❯ U+276F, box-drawing ╰─) render via fontconfig fallback to DejaVu (10-terminal
# installs fonts-dejavu-core to guarantee coverage).

"$schema" = 'https://starship.rs/config-schema.json'

# Performance guards — keep rendering fast even in big repos.
command_timeout = 1000
scan_timeout = 30
add_newline = true

# Line 1: directory + git + language/tooling versions for my stack.
# Line 2: the ╰─❯ connector caret.
format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$docker_context\
$line_break\
[╰─](#4c86ff)$character"""

[directory]
# Full path from ~ (no truncation) — the Professor always wants the whole path to
# orient (e.g. ~/github/mahernandezg/lnx-gui-ide). truncation_length=0 disables
# the truncation; truncate_to_repo=false stops collapsing to the repo root.
truncate_to_repo = false
truncation_length = 0
style = "bold cyan"
read_only = " "

[git_branch]
# Brand amber, rendered as "[ branch ]" (literal brackets escaped; no symbol).
symbol = ""
format = "[\\[ $branch \\]]($style)"
style = "bold #ffbf47"

[git_status]
style = "bold yellow"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# Node/TypeScript: starship's nodejs module covers TS via project files/extensions.
[nodejs]
symbol = " "
style = "bold green"
detect_extensions = ["ts", "tsx", "js", "jsx", "mjs", "cjs"]
detect_files = ["package.json", "tsconfig.json", ".nvmrc"]

[python]
symbol = " "
style = "bold yellow"

[rust]
symbol = " "
style = "bold red"

[docker_context]
symbol = " "
style = "bold blue"
only_with_files = true

[character]
# Line 2 is the connector ╰─❯: the ╰─ (in `format`) and the success ❯ share the
# brand blue #4c86ff so a healthy prompt is one continuous blue inviting you to
# type; error red / vimcmd green of the brand.
success_symbol = "[❯](bold #4c86ff)"
error_symbol = "[❯](bold #D81E05)"
vimcmd_symbol = "[❯](bold #52be80)"

# Explicitly disable a few modules that are commonly auto-detected elsewhere, so
# they never add latency even if referenced indirectly. (Modules not in `format`
# above already do not render; these are belt-and-suspenders for cost.)
[package]
disabled = true
[aws]
disabled = true
[gcloud]
disabled = true
[kubernetes]
disabled = true
