# tmux.conf — lnx-cli-tui-ide · mahg brand (navy), dark only.
#
# tmux provides splits and persistent sessions on top of GNOME Terminal's tabs.
# It is launched MANUALLY (no auto-start in .bashrc); GNOME Terminal tabs stay the
# default for quick parallel shells. Symlinked to ~/.config/tmux/tmux.conf.

# ---- Truecolor (so the brand hex colours render exactly) --------------------
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# ---- Prefix: C-a (frees C-b) ------------------------------------------------
set -g prefix C-a
unbind C-b
bind C-a send-prefix          # double-tap C-a sends a literal C-a to the app

# ---- Splits: intuitive | and - , inheriting the current pane's path ---------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# keep the stock split keys too, also path-aware
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
# new windows inherit the path as well
bind c new-window -c "#{pane_current_path}"

# ---- Numeric layouts: C-a 1/2/3/4 build a whole layout from one pane ---------
# These REPLACE the tmux defaults (C-a 1..4 = select-window 1-4). The Professor
# navigates windows with the mouse (mouse on) and C-a w; the digits are easier than
# | (which needs AltGr on an ES keyboard). | and - still work for manual splits.
# Each shortcut splits from the CURRENT single pane and applies the layout.
unbind 1
unbind 2
unbind 3
unbind 4
# C-a 1 -> two columns, side by side
bind 1 split-window -h -c "#{pane_current_path}" \; select-layout even-horizontal
# C-a 2 -> three columns (triptych)
bind 2 split-window -h -c "#{pane_current_path}" \; split-window -h -c "#{pane_current_path}" \; select-layout even-horizontal
# C-a 3 -> main-vertical: one big pane left, two stacked right
bind 3 split-window -h -c "#{pane_current_path}" \; split-window -v -c "#{pane_current_path}" \; select-layout main-vertical
# C-a 4 -> 2x2 grid (four panes, tiled)
bind 4 split-window -h -c "#{pane_current_path}" \; split-window -v -c "#{pane_current_path}" \; split-window -v -c "#{pane_current_path}" \; select-layout tiled

# ---- Mouse ------------------------------------------------------------------
set -g mouse on

# ---- Pane navigation (vim h/j/k/l) + resize (H/J/K/L, repeatable) -----------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# arrows with the prefix also move between panes
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R
# resize, repeatable (-r): tap the key after the prefix to keep resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---- Quality of life --------------------------------------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -sg escape-time 10
set -g focus-events on

# Reload this config without restarting the server.
bind r source-file "${HOME}/.config/tmux/tmux.conf" \; display-message "tmux.conf reloaded"

# ---- mahg brand colours (navy; dark only) -----------------------------------
# Status bar — deep navy background, muted text.
set -g status on
set -g status-justify left
set -g status-style "bg=#070b16,fg=#a9b4cc"
# Active window in brand blue; inactive in deep navy. ASCII only (no glyph deps).
setw -g window-status-current-style "bg=#2f6bff,fg=#edf2ff,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-style "bg=#15233f,fg=#a9b4cc"
setw -g window-status-format " #I:#W "
# Pane borders — subtle navy, active border in brand blue.
set -g pane-border-style "fg=#223153"
set -g pane-active-border-style "fg=#2f6bff"
# Messages / command prompt.
set -g message-style "bg=#15233f,fg=#edf2ff"
# Left: session name in brand amber (matches the prompt's [ branch ]).
set -g status-left-length 30
set -g status-left "#[fg=#ffbf47,bold] #S #[default] "
# Right: compact date + time in brand tones (no clutter).
set -g status-right-length 40
set -g status-right "#[fg=#a9b4cc]%Y-%m-%d #[fg=#edf2ff]%H:%M "
