# yazi.toml — lnx-cli-tui-ide
# Show dotfiles and hidden folders by default. Toggle live in yazi with '.'.
# (Section is [mgr] on recent yazi; older builds use [manager].)

[mgr]
show_hidden = true

# Open text/code files with micro (the stack's default editor). This overrides
# yazi's built-in "edit" opener (which would otherwise use $EDITOR); yazi's default
# [open] rules already route text/code to the "edit" opener, so Enter / `o` on a
# text file launches micro. block=true keeps yazi suspended while micro is open.
[opener]
edit = [
  { run = 'micro "$@"', desc = "micro", block = true, for = "unix" },
]
