# Helix config.toml — lnx-cli-tui-ide
# Legible, terminal-first defaults. Language servers are wired in languages.toml.

theme = "mahg-dark"   # branded theme; inherits base16_terminal so it still follows the terminal palette
# Dark/light pair: a matching "mahg-light" theme is also installed. Helix has no
# native "follow the OS color-scheme" switch (no theme-by-mode key), so switch
# manually: `:theme mahg-light` / `:theme mahg-dark` at runtime, or change the
# line above and reload config in place with `pkill -USR1 hx`. See README §3.

[editor]
line-number = "relative"
mouse = true
bufferline = "multiple"
color-modes = true
cursorline = true
true-color = true
rulers = [100]
text-width = 100
# Show LSP status / diagnostics inline but not noisily.
idle-timeout = 250
completion-trigger-len = 2

[editor.statusline]
left = ["mode", "spinner", "file-name", "read-only-indicator", "file-modification-indicator"]
center = []
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false   # show dotfiles in the picker

[editor.lsp]
display-messages = true
display-inlay-hints = false   # off by default to keep things light on old laptops

[editor.indent-guides]
render = true
character = "┊"

[editor.soft-wrap]
enable = true

# A couple of quality-of-life keymaps; keep close to defaults otherwise.
[keys.normal]
"C-s" = ":w"
"C-q" = ":q"

[keys.normal.space]
# space-e toggles the file explorer-style picker
e = "file_picker"
