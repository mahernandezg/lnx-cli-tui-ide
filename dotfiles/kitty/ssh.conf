# ssh.conf — kitty ssh kitten configuration (included by kitty.conf).
# Makes terminfo and a minimal shell environment travel to remote hosts so
# Helix, lazygit, yazi, etc. render correctly over SSH.
#
# No host, user, or key values live here. Those are kept in a local, gitignored
# config.env and written to ~/.ssh/config by modules/60-ssh-alias.sh. The kitten
# resolves HostName/User/IdentityFile from the matching `Host` block in
# ~/.ssh/config, so the key reference exists in exactly one place and never in
# this repo.
#
# Usage:  kitten ssh <your-alias>

# Defaults applied to every host the kitten connects to.
hostname *
# Ship kitty's terminfo to the remote so $TERM=xterm-kitty is understood there.
copy_terminfo yes
# Use a login shell on the remote so PATH/aliases load.
login_shell -
# Reuse a single multiplexed connection per host.
share_connections yes
