# kitty.conf — lnx-cli-tui-ide
# Terminal-centric, long-session-friendly config. Per-machine values (scrollback
# sized to RAM) live in local.conf, included at the end. Never edit local.conf in
# the repo; the installer generates it on each machine.

# ---- Font -------------------------------------------------------------------
# JetBrainsMono Nerd Font supplies the icons used by yazi and lazygit.
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
# Make powerline/Nerd glyphs align nicely.
disable_ligatures never

# ---- Color theme — a calm, legible dark palette tuned for long sessions ----
# Based on the "Tomorrow Night" scheme by Chris Kempson (MIT). Chosen over the
# default for lower contrast on long sessions.
foreground            #c5c8c6
background            #1d1f21
selection_foreground  #1d1f21
selection_background  #c5c8c6
cursor                #c5c8c6
cursor_text_color     background

# Normal
color0  #1d1f21
color1  #cc6666
color2  #b5bd68
color3  #f0c674
color4  #81a2be
color5  #b294bb
color6  #8abeb7
color7  #c5c8c6
# Bright
color8  #969896
color9  #d54e53
color10 #b9ca4a
color11 #e7c547
color12 #7aa6da
color13 #c397d8
color14 #70c0b1
color15 #eaeaea

# Comfortable contrast on selection and URLs.
url_color #81a2be
url_style curly

# ---- Window & layout defaults ----------------------------------------------
remember_window_size  yes
initial_window_width  120c
initial_window_height 34c
window_padding_width  6
hide_window_decorations no
confirm_os_window_close 1
# kitty tabs/windows/layouts cover daily multiplexing (no tmux by default).
enabled_layouts splits,stack,tall,fat,grid
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

# ---- Scrollback -------------------------------------------------------------
# Base value; local.conf (generated per-machine) overrides scrollback_lines to
# match available RAM. A large pager buffer keeps long AI-CLI output reachable.
scrollback_lines 10000
scrollback_pager_history_size 64

# ---- Graphics / performance -------------------------------------------------
# kitty graphics protocol is the whole reason this terminal was chosen: it lets
# euporie render inline notebook plots. Keep it enabled.
allow_remote_control yes
repaint_delay 8
input_delay 2
sync_to_monitor yes

# ---- Bells & misc -----------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0
update_check_interval 0
shell_integration enabled

# ---- Keymaps for multiplexing (tabs/splits) --------------------------------
map ctrl+shift+enter new_window
map ctrl+shift+t      new_tab
map ctrl+shift+]      next_window
map ctrl+shift+[      previous_window
map ctrl+shift+l      next_layout

# ---- Includes ---------------------------------------------------------------
# SSH kitten config (carries terminfo to remote aliases). Linked by the installer.
include ssh.conf
# Per-machine generated overrides (scrollback sized to RAM, etc.). Optional.
include local.conf
